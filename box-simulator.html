<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico">
<title>Box Simulator — Really Good Trades</title>
<link rel="stylesheet" href="sets/badges.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --border: #e2ddd6; --border-strong: #c8c2b8;
    --text: #1a1814; --text-muted: #7a7268; --accent: #1D7A4F;
  }
  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { border-bottom: 3px solid #CC0000; }
  .top-bar {
    background: #1a1814; color: #aaa;
    font-family: 'Arial', sans-serif; font-size: 0.8rem;
    display: flex; align-items: center; padding: 0.5rem 1.25rem; gap: 0.4rem;
  }
  .top-bar a { color: #aaa; text-decoration: none; }
  .top-bar a:hover { color: #fff; }
  .top-bar .sep { opacity: 0.4; }

  /* PAGE LAYOUT */
  .page { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .page-title {
    font-size: 1.4rem; font-weight: normal;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.3rem;
  }
  .page-sub {
    font-family: 'Arial', sans-serif; font-size: 0.82rem;
    color: var(--text-muted); margin-bottom: 1.75rem;
  }

  /* BOX INFO STRIP */
  .box-info {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem 1rem;
    font-family: 'Arial', sans-serif; font-size: 0.8rem;
    color: var(--text-muted); margin-bottom: 1.75rem;
  }
  .box-info-item { display: flex; align-items: center; gap: 0.4rem; }
  .badge-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* OPEN BUTTON */
  .action-top { display: flex; justify-content: center; margin-bottom: 2rem; }
  .btn {
    padding: 0.7rem 2rem; font-family: 'Arial', sans-serif;
    font-size: 0.88rem; font-weight: bold; letter-spacing: 0.05em;
    border-radius: 8px; cursor: pointer; transition: background 0.15s;
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #165f3d; border-color: #165f3d; }
  .btn-secondary {
    background: var(--surface); color: var(--text);
    border-color: var(--border-strong);
  }
  .btn-secondary:hover { background: var(--bg); }

  /* CARDS AREA */
  .cards-area {
    display: flex; gap: 1rem; justify-content: center;
    flex-wrap: wrap; margin-bottom: 1.5rem;
  }

  /* CARD FLIP */
  .card-slot { perspective: 900px; width: 175px; }
  .card-inner {
    width: 100%; height: 240px; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); cursor: default; }
  .card-face {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,0.13);
  }

  /* CARD BACK */
  .card-back {
    background: #1a1814;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.5rem;
  }
  .card-back-border {
    position: absolute; inset: 7px;
    border: 1px solid #333; border-radius: 7px; pointer-events: none;
  }
  .card-back-logo {
    font-family: 'Georgia', serif; color: #CC0000;
    font-size: 1.9rem; letter-spacing: 0.04em;
  }
  .card-back-label {
    font-family: 'Arial', sans-serif; font-size: 0.6rem;
    letter-spacing: 0.16em; text-transform: uppercase; color: #555;
  }
  .card-tap-hint {
    position: absolute; bottom: 14px;
    font-family: 'Arial', sans-serif; font-size: 0.58rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: #444;
  }

  /* CARD FRONT */
  .card-front {
    transform: rotateY(180deg);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .card-stripe { height: 7px; flex-shrink: 0; }
  .card-body {
    flex: 1; padding: 0.8rem 0.9rem;
    display: flex; flex-direction: column;
  }
  .card-subset {
    font-family: 'Arial', sans-serif; font-size: 0.62rem;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-muted); margin-bottom: 0.5rem;
  }
  .card-name {
    font-family: 'Georgia', serif; font-size: 1rem;
    line-height: 1.25; color: var(--text); flex: 1;
  }
  .card-team {
    font-family: 'Arial', sans-serif; font-size: 0.72rem;
    color: var(--text-muted); margin-top: 0.3rem;
  }
  .card-num {
    font-family: 'Arial', sans-serif; font-size: 0.62rem;
    color: var(--border-strong); margin-top: 0.6rem;
  }
  .card-sig-pill {
    display: inline-block; align-self: flex-start;
    background: #d4a017; color: #fff;
    font-family: 'Arial', sans-serif; font-size: 0.58rem;
    font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 2px 7px; border-radius: 3px; margin-bottom: 0.4rem;
  }

  /* RESULTS */
  .results-summary {
    display: none; text-align: center;
    font-family: 'Arial', sans-serif; font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .results-summary.show { display: block; }
  .sig-congrats {
    font-size: 1.05rem; color: #b8850e; font-weight: bold;
    margin-bottom: 0.75rem;
  }

  /* STATS STRIP */
  .sim-stats {
    display: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.9rem 1.25rem;
    gap: 2.5rem; flex-wrap: wrap; margin-top: 2rem;
  }
  .sim-stats.show { display: flex; }
  .stat-item { display: flex; flex-direction: column; gap: 0.15rem; }
  .stat-label {
    font-family: 'Arial', sans-serif; font-size: 0.62rem;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
  }
  .stat-value {
    font-family: 'Arial', sans-serif; font-size: 1.15rem;
    font-weight: bold; color: var(--text);
  }

  @media (max-width: 640px) {
    .card-slot { width: calc(50% - 0.5rem); }
    .card-inner { height: 210px; }
    .card-back-logo { font-size: 1.5rem; }
    .card-name { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <a href="index.html">&#8592; Really Good Trades</a>
    <span class="sep">/</span>
    <span>Box Simulator</span>
  </div>
</header>

<main class="page">
  <h1 class="page-title">Box Simulator</h1>
  <p class="page-sub">Supremacy Rookie 2025 &mdash; 4 cards per box</p>

  <div class="box-info">
    <div class="box-info-item">
      <div class="badge-dot" style="background:#2563eb;"></div>
      3&times; Rookies Platinum Blue
    </div>
    <div class="box-info-item">
      <div class="badge-dot" style="background:#16a34a;"></div>
      1&times; Rookies Platinum Green
    </div>
    <div class="box-info-item">
      <div class="badge-dot" style="background:#d4a017;"></div>
      Signature hit (1 in 7 boxes &mdash; replaces Platinum Green)
    </div>
  </div>

  <div class="action-top">
    <button class="btn btn-primary" id="open-btn" onclick="openBox()">Open Box</button>
  </div>

  <div class="cards-area" id="cards-area"></div>

  <div class="results-summary" id="results-summary"></div>

  <div class="sim-stats" id="sim-stats">
    <div class="stat-item">
      <span class="stat-label">Boxes Opened</span>
      <span class="stat-value" id="stat-boxes">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Signatures Pulled</span>
      <span class="stat-value" id="stat-sigs">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Sig Rate</span>
      <span class="stat-value" id="stat-rate">&mdash;</span>
    </div>
  </div>
</main>

<script src="sets/supremacy-rookie-2025.js"></script>
<script>
const RPB = CARDS_SUPREMACY_ROOKIE_2025.filter(c => c[2] === 'Rookies Platinum Blue');
const RPG = CARDS_SUPREMACY_ROOKIE_2025.filter(c => c[2] === 'Rookies Platinum Green');
const RS  = CARDS_SUPREMACY_ROOKIE_2025.filter(c => c[2] === 'Rookies Signature');

const SUBSET_COLOR = {
  'Rookies Platinum Blue':  '#2563eb',
  'Rookies Platinum Green': '#16a34a',
  'Rookies Signature':      '#d4a017',
};

const SUBSET_SHORT = {
  'Rookies Platinum Blue':  'Platinum Blue',
  'Rookies Platinum Green': 'Platinum Green',
  'Rookies Signature':      'Signature',
};

let boxesOpened = 0;
let sigsTotal   = 0;
let currentCards = [];
let flippedCount = 0;

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function simulateBox() {
  // 3 Platinum Blues, no duplicate player
  const blues = [];
  const used = new Set();
  for (let i = 0; i < 3; i++) {
    const pool = RPB.filter(c => !used.has(c[1]));
    const card = pick(pool);
    blues.push(card);
    used.add(card[1]);
  }

  // 4th slot: sig (1-in-7) or green
  const isSig = Math.random() < 1 / 7;
  const fourth = isSig ? pick(RS) : pick(RPG);

  return { cards: shuffle([...blues, fourth]), isSig };
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCards(cards) {
  const area = document.getElementById('cards-area');
  area.innerHTML = cards.map((card, i) => {
    const [num, name, subset, team] = card;
    const color = SUBSET_COLOR[subset] || '#94a3b8';
    const isSig = subset === 'Rookies Signature';
    return `
      <div class="card-slot">
        <div class="card-inner" id="card-${i}" onclick="flipCard(${i})">
          <div class="card-face card-back">
            <div class="card-back-border"></div>
            <div class="card-back-logo">RGT</div>
            <div class="card-back-label">Supremacy Rookie '25</div>
            <div class="card-tap-hint">Tap to reveal</div>
          </div>
          <div class="card-face card-front">
            <div class="card-stripe" style="background:${color};"></div>
            <div class="card-body">
              <div class="card-subset">${escHtml(SUBSET_SHORT[subset] || subset)}</div>
              ${isSig ? '<div class="card-sig-pill">&#10022; Signature</div>' : ''}
              <div class="card-name">${escHtml(name)}</div>
              <div class="card-team">${escHtml(team)}</div>
              <div class="card-num">${escHtml(num)}</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('results-summary').classList.remove('show');
}

function flipCard(idx) {
  const el = document.getElementById('card-' + idx);
  if (!el || el.classList.contains('flipped')) return;
  el.classList.add('flipped');
  flippedCount++;
  if (flippedCount === currentCards.length) onAllRevealed();
}

function onAllRevealed() {
  const hasSig = currentCards.some(c => c[2] === 'Rookies Signature');
  const summary = document.getElementById('results-summary');
  summary.innerHTML = (hasSig ? '<div class="sig-congrats">&#127942; Signature hit!</div>' : '')
    + '<button class="btn btn-secondary" onclick="openBox()">Open another box</button>';
  summary.classList.add('show');
}

function openBox() {
  flippedCount = 0;
  const { cards, isSig } = simulateBox();
  currentCards = cards;
  boxesOpened++;
  if (isSig) sigsTotal++;
  renderCards(cards);
  updateStats();
  document.getElementById('open-btn').textContent = 'Open another box';
}

function updateStats() {
  document.getElementById('sim-stats').classList.add('show');
  document.getElementById('stat-boxes').textContent = boxesOpened;
  document.getElementById('stat-sigs').textContent  = sigsTotal;
  document.getElementById('stat-rate').textContent  = boxesOpened > 0
    ? Math.round((sigsTotal / boxesOpened) * 100) + '%'
    : '—';
}
</script>
</body>
</html>
